services:
  dockboard:
    image: ghcr.io/josew383/dockboard:latest
    container_name: dockboard
    ports:
      - "8080:4321"
    volumes:
      # Mount your config file (read-only)
      - ./config.yml:/app/config.yml:ro
      # Mount your icons folder (read-only)
      # Icons are served dynamically via /icons/[file] endpoint
      - ./icons:/app/icons:ro
    environment:
      - HOST=0.0.0.0
      - PORT=4321
      - CONFIG_PATH=/app/config.yml
      - ICONS_PATH=/app/icons
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4321/api/config"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
